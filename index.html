<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Inter, sans-serif;
      background: #101224;
      color: #f4f1ea;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #101224;
    }

    .screen {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== SPLASH SCREEN ===== */
    .splash {
      background: linear-gradient(135deg, #101224 0%, #1a1d2d 50%, #101224 100%);
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .splash::before {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(230, 117, 135, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      right: -60px;
      top: -80px;
    }

    .splash::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(135, 178, 247, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      left: -80px;
      bottom: 80px;
    }

    .logo-mark {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      position: relative;
      z-index: 2;
    }

    .logo-mark svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 30px rgba(242, 183, 109, 0.1));
    }

    .splash-label {
      text-align: center;
      font-size: 11px;
      letter-spacing: 4px;
      color: #908fa0;
      margin-bottom: 30px;
      position: relative;
      z-index: 2;
      font-weight: 500;
    }

    .splash h1 {
      font-size: 44px;
      font-weight: 600;
      line-height: 58px;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }

    .splash-desc {
      font-size: 14px;
      color: #908fa0;
      line-height: 22px;
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
    }

    .source-badge {
      background: #1a1d2d;
      border: 1px solid #2d3142;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 10px;
      color: #908fa0;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      gap: 12px;
      margin-bottom: 32px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      color: #908fa0;
    }

    .divider {
      width: 1px;
      height: 36px;
      background: #2d3647;
    }

    .cta-button {
      background: #f2b76d;
      color: #1a0f03;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(242, 183, 109, 0.2);
    }

    .disclaimer {
      font-size: 11px;
      color: #908fa0;
      text-align: center;
      line-height: 17px;
      position: relative;
      z-index: 2;
    }

      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .topbar {
      background: #1a1d2d;
      padding: 20px 20px;
      border-bottom: 1px solid #2d3647;
    }

    .topbar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #908fa0;
      font-size: 20px;
      cursor: pointer;
    }

    .progress-text {
      font-size: 13px;
      color: #908fa0;
      font-weight: 500;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #2d3647;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #f2b76d;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .question-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
    }

    .category-badge {
      display: inline-block;
      background: rgba(242, 183, 109, 0.12);
      color: #f2b76d;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .source-text {
      font-size: 10px;
      color: #908fa0;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      line-height: 28px;
      margin-bottom: 24px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .option-card {
      background: #1a1d2d;
      border: 1.5px solid transparent;
      border-radius: 12px;
      padding: 16px 16px 16px 56px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    .option-card:hover {
      background: #232845;
    }

    .option-card.selected {
      background: rgba(242, 183, 109, 0.12);
      border-color: #f2b76d;
    }

    .option-label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #2d3647;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #908fa0;
      transition: all 0.2s ease;
    }

    .option-card.selected .option-label {
      background: #f2b76d;
      color: #1a0f03;
    }

    .option-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .option-card.selected .option-title {
      color: #f2b76d;
    }

    .option-desc {
      font-size: 12px;
      color: #908fa0;
    }

    .question-footer {
      padding: 0 20px 20px;
    }

    .next-button {

      background: #f2b76d;
      color: #1a0f03;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .next-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(242, 183, 109, 0.2);
    }

    .dimension-hint {
      font-size: 9px;
      color: #908fa0;
      text-align: center;
      margin-top: 12px;
    }

    /* ===== CALCULATING SCREEN ===== */
    .calculating {
      background: #101224;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .concentric-circles {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid;
    }

    .calc-title {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
    }

    .calc-subtitle {
      font-size: 13px;
      color: #908fa0;
      text-align: center;
      line-height: 20px;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
    }

    .dimension-bars {
      width: 100%;
      max-width: 300px;
      position: relative;
      z-index: 2;
    }

    .dim-bar {
      margin-bottom: 16px;
    }

    .dim-label {
      font-size: 11px;
      color: #908fa0;
      margin-bottom: 4px;
    }

    .dim-track {
      width: 100%;
      height: 6px;
      background: #2d3647;
      border-radius: 3px;
      overflow: hidden;
    }

    .dim-fill {
      height: 100%;
      background: #f2b76d;
      border-radius: 3px;
      animation: expanding 2.5s ease-in-out forwards;
    }

    @keyframes expanding {
      0% { width: 0%; }
      100% { width: var(--width); }
    }

    /* ===== RESULT SCREEN ===== */
    .result-screen {
      background: #101224;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
    }

    .result-header {
      position: relative;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .result-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-result);
      z-index: 1;
    }

    .result-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 2;
    }

    .result-badge {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 3px;
      margin-bottom: 12px;
      position: relative;
      z-index: 3;
      font-weight: 500;
    }

    .result-title {
      font-size: 52px;
      font-weight: 600;
      margin-bottom: 8px;
      position: relative;
      z-index: 3;
    }

    .result-en {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
      position: relative;
      z-index: 3;
    }

    .kinsey-badge {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.9);
      position: relative;
      z-index: 3;
    }

    .result-content {
      background: #1a1d2d;
      padding: 32px 24px;
      flex: 1;
    }

    .result-description {
      font-size: 14px;
      line-height: 22px;
      margin-bottom: 28px;
      color: #f4f1ea;
    }

    .dimensions-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #908fa0;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .dimension-row {
      display: grid;
      grid-template-columns: 90px 1fr 40px;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .dim-name {
      font-size: 11px;
      color: #908fa0;
    }

    .dim-bar-result {
      height: 5px;
      background: #2d3647;
      border-radius: 2px;
      overflow: hidden;
    }

    .dim-bar-fill {
      height: 100%;
      background: currentColor;
      border-radius: 2px;
    }

    .dim-score {
      font-size: 11px;
      color: #908fa0;
      text-align: right;
    }

    .related-section {
      margin-top: 28px;
    }

    .related-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #908fa0;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .tag {
      background: #232845;
      color: #908fa0;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 500;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .retake-btn {
      background: #232845;
      color: #908fa0;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .retake-btn:hover {
      background: #2d3647;
    }

    .share-btn {
      background: #f2b76d;
      color: #1a0f03;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(242, 183, 109, 0.2);
    }

    .result-footer {
      font-size: 9px;
      color: #908fa0;
      text-align: center;
      line-height: 15px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2d3647;
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3d4657;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-height: 800px) {
      .splash {
        padding: 30px 20px;
      }
      .splash h1 {
        font-size: 36px;
        line-height: 48px;
      }
    }
  </style>
</head>

    // ===== MAIN APP =====
    function SpectrumApp() {
      const [screen, setScreen] = useState('splash'); // splash, questions, calculating, result
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [answers, setAnswers] = useState(new Array(QUESTIONS.length).fill(null));
      const [result, setResult] = useState(null);

      const handleStartQuiz = () => {
        setScreen('questions');
      };

      const handleSelectOption = (index) => {
        const newAnswers = [...answers];
        newAnswers[currentQuestion] = index + 1; // 1-7 scoring
        setAnswers(newAnswers);
      };

      const handleNextQuestion = () => {
        if (answers[currentQuestion] === null) {
          alert('请选择一个选项后继续');
          return;
        }

        if (currentQuestion < QUESTIONS.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
        } else {
          // Calculate result
          calculateResult();
        }
      };

      const handlePrevQuestion = () => {
        if (currentQuestion > 0) {
          setCurrentQuestion(currentQuestion - 1);
        }
      };

      const calculateResult = () => {
        setScreen('calculating');
        setTimeout(() => {
          // Calculate dimension scores (average of responses for each dimension)
          const dimScores = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0 };
          const dimCounts = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0 };

          QUESTIONS.forEach((q, idx) => {
            if (answers[idx] !== null) {
              dimScores[q.dimension] += answers[idx];
              dimCounts[q.dimension]++;
            }
          });

          Object.keys(dimScores).forEach(d => {
            if (dimCounts[d] > 0) {
              dimScores[d] = dimScores[d] / dimCounts[d];
            }
          });

          // Calculate overall sexual attraction score (primarily from A, B, C dimensions)
          const sexualScore = (dimScores.A + dimScores.B + dimScores.C) / 3;

          // Determine orientation based on pattern
          let orientation = ORIENTATIONS[3]; // Default bisexual

          // Simple algorithm: if mostly high scores on A dimension
          if (dimScores.A <= 1.5) {
            orientation = ORIENTATIONS[0]; // exclusive hetero
          } else if (dimScores.A <= 2.3) {
            orientation = ORIENTATIONS[1]; // primary hetero
          } else if (dimScores.A <= 2.8) {
            orientation = ORIENTATIONS[2]; // mostly hetero
          } else if (dimScores.A <= 3.5) {
            orientation = ORIENTATIONS[3]; // bisexual
            if (dimScores.G >= 3.8) orientation = ORIENTATIONS[4]; // fluid
          } else if (dimScores.A <= 4) {
            orientation = ORIENTATIONS[5]; // pansexual
          } else if (dimScores.A <= 4.5) {
            orientation = ORIENTATIONS[6]; // mostly homo
          } else if (dimScores.A <= 5.2) {
            orientation = ORIENTATIONS[7]; // primary homo
          } else {
            orientation = ORIENTATIONS[8]; // exclusive homo
          }

          if (sexualScore <= 1.2) {
            if (Math.random() > 0.5) {
              orientation = ORIENTATIONS[9]; // asexual
            } else {
              orientation = ORIENTATIONS[10]; // graysexual
            }
          }

          const resultData = {
            orientation,
            dimScores,
            sexualScore
          };

          setResult(resultData);
          setScreen('result');
        }, 2500);
      };

      const handleRetake = () => {
        setCurrentQuestion(0);
        setAnswers(new Array(QUESTIONS.length).fill(null));
        setResult(null);
        setScreen('splash');
      };

      const handleShare = () => {
        const text = `我在 Spectrum 性取向探索测试中的结果是：${result.orientation.name} (${result.orientation.en})。基于 Klein KSOG 心理学框架，来测试一下你的性取向吧！`;
        if (navigator.share) {
          navigator.share({
            title: 'Spectrum - 性取向探索测试',
            text: text,
          });
        } else {
          alert(text);
        }
      };

      return (
        <div className="container">
          <div className="screen">
            {screen === 'splash' && <SplashScreen onStart={handleStartQuiz} />}
            {screen === 'questions' && (
              <QuestionScreen
                question={QUESTIONS[currentQuestion]}
                questionNumber={currentQuestion + 1}
                totalQuestions={QUESTIONS.length}
                selectedOption={answers[currentQuestion] - 1}
                onSelectOption={handleSelectOption}
                onNext={handleNextQuestion}
                onPrev={handlePrevQuestion}
                canPrev={currentQuestion > 0}
              />
            )}
            {screen === 'calculating' && <CalculatingScreen />}
            {screen === 'result' && result && (
              <ResultScreen
                result={result}
                onRetake={handleRetake}
                onShare={handleShare}
              />
            )}
          </div>
        </div>
      );

              {questionNumber === totalQuestions ? '提交答卷  ✓' : '下一题  →'}
            </button>
            <div className="dimension-hint">维度：{question.label} · 时态：{question.time}</div>
          </div>
        </div>
      );
    }

    // ===== CALCULATING SCREEN =====
    function CalculatingScreen() {
      const dimensions = ['性吸引力', '情感偏好', '性幻想', '社交偏好', '自我认同', '生活方式', '流动性'];
      const widths = [95, 78, 88, 62, 91, 74, 85];

      return (
        <div className="calculating">
          <div className="concentric-circles">
            {[300, 220, 160, 100, 60].map((sz, i) => (
              <div
                key={i}
                className="circle"
                style={{
                  width: sz,
                  height: sz,
                  borderColor: `rgba(242, 183, 109, ${0.08 + i * 0.05})`,
                }}
              ></div>
            ))}
          </div>

          <h2 className="calc-title">正在分析你的结果...</h2>
          <p className="calc-subtitle">我们正在根据 Klein KSOG 七维模型<br/>综合评估你的 50 道题目回答</p>

          <div className="dimension-bars">
            {dimensions.map((dim, idx) => (
              <div key={idx} className="dim-bar">
                <div className="dim-label">{dim}</div>
                <div className="dim-track">
                  <div
                    className="dim-fill"
                    style={{ '--width': `${widths[idx] * 2}px` }}
                  ></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ===== RESULT SCREEN =====
    function ResultScreen({ result, onRetake, onShare }) {
      const o = result.orientation;
      const colors = {
        A: '#e57587',
        B: '#a680e7',
        C: '#87b2f7',
        D: '#f2b76d',
        E: '#f2b76d',
        F: '#e57587',
        G: '#87b2f7',
      };

      const dimNames = ['性吸引力', '情感偏好', '性幻想', '社交偏好', '自我认同', '生活方式', '流动性'];
      const dimKeys = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];

      return (
        <div className="result-screen">
          <div className="result-header" style={{ '--gradient-result': o.gradient }}>
            <div className="result-badge">探索结果</div>
            <h1 className="result-title">{o.name}</h1>
            <div className="result-en">{o.en}</div>
            <div className="kinsey-badge">Kinsey 评分：{(o.kinsey).toFixed(1)} / 6</div>
          </div>

          <div className="result-content">
            <p className="result-description">{o.desc}</p>

            <div className="dimensions-title">KLEIN KSOG 七维度评估</div>
            {dimKeys.map((key, idx) => (
              <div key={key} className="dimension-row">
                <div className="dim-name">{dimNames[idx]}</div>
                <div className="dim-bar-result">
                  <div
                    className="dim-bar-fill"
                    style={{
                      width: `${(result.dimScores[key] / 7) * 100}%`,
                      background: colors[key],
                    }}
                  ></div>
                </div>
                <div className="dim-score">{(result.dimScores[key]).toFixed(1)}</div>
              </div>
            ))}

            <div className="related-section">
              <div className="related-title">相关取向标签</div>
              <div className="tags">
                {o.relatedTags.map(tag => (
                  <div key={tag} className="tag">{tag}</div>
                ))}
              </div>
            </div>

            <div className="action-buttons">
              <button className="retake-btn" onClick={onRetake}>重新测试</button>
              <button className="share-btn" onClick={onShare}>分享结果</button>
            </div>

            <div className="result-footer">
              参考文献：Kinsey, A. (1948) · Klein, F. (1978) · Storms, M. (1980)<br/>
              本测试基于权威心理学框架，仅供参考和自我探索之用。
            </div>
          </div>
        </div>
      );
    }

    // ===== RENDER =====
    ReactDOM.createRoot(document.getElementById('root')).render(<SpectrumApp />);
  </script>
</body>
</html>
